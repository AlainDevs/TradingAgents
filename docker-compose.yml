services:
  tradingagents:
    build: .
    container_name: tradingagents_cli
    env_file:
      - .env
    # Persist isolated run outputs on the host.
    volumes:
      - ./results:/app/results
    # Keeps the container running interactively if you want to attach to it
    stdin_open: true 
    tty: true

  tradingagents-web:
    build:
      context: .
      target: web
    container_name: tradingagents_web
    env_file:
      - .env
    environment:
      WEB_CLI_USER: ${WEB_CLI_USER:-}
      WEB_CLI_PASSWORD: ${WEB_CLI_PASSWORD:-}
    ports:
      - "${WEB_CLI_PORT:-7681}:7681"
    volumes:
      - ./results:/app/results
    stdin_open: true
    tty: true
