services:
  tradingagents:
    build: .
    container_name: tradingagents_cli
    env_file:
      - .env
    # The repo mentions a 'data_cache' in their .gitignore, 
    # so we can map a volume to persist data across container restarts
    volumes:
      - ./data_cache:/app/data_cache
    # Keeps the container running interactively if you want to attach to it
    stdin_open: true 
    tty: true

  tradingagents-web:
    build:
      context: .
      target: web
    container_name: tradingagents_web
    env_file:
      - .env
    environment:
      WEB_CLI_USER: ${WEB_CLI_USER:-}
      WEB_CLI_PASSWORD: ${WEB_CLI_PASSWORD:-}
    ports:
      - "${WEB_CLI_PORT:-7681}:7681"
    volumes:
      - ./data_cache:/app/data_cache
    stdin_open: true
    tty: true
